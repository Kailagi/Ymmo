services:
  ymmo-db:
    image: postgres:16-alpine
    container_name: ymmo-db-container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ymmo-network

  ymmo-backend:
    build: ./backend
    container_name: ymmo-backend-container
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - ymmo-db
    networks:
      - ymmo-network

volumes:
  postgres_data:

networks:
  ymmo-network:
    driver: bridge